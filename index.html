<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dice Labs — Coming Soon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,sans-serif;background:#0b1020;color:#fff;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;
background:
radial-gradient(circle at 20% 20%,rgba(0,255,170,.18),transparent 35%),
radial-gradient(circle at 80% 70%,rgba(70,120,255,.18),transparent 35%),#0b1020}
body:before{content:"";position:fixed;inset:-50%;background:
linear-gradient(90deg,transparent 49.8%,rgba(255,255,255,.03) 50%,transparent 50.2%),
linear-gradient(transparent 49.8%,rgba(255,255,255,.03) 50%,transparent 50.2%);
background-size:42px 42px;transform:rotate(8deg);animation:d 35s linear infinite}
@keyframes d{to{transform:rotate(8deg) translate(-42px,-42px)}}
.card{position:relative;z-index:2;width:min(92vw,720px);padding:64px 40px;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:28px;backdrop-filter:blur(18px)}
.logo{font-size:4.5rem}
h1{font-size:clamp(2.6rem,7vw,5rem);letter-spacing:-.05em;margin:.2em 0}
p{color:rgba(255,255,255,.72);line-height:1.7;max-width:540px;margin:auto}
.tag{display:inline-block;margin-top:30px;padding:10px 18px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#9df5d3;font-weight:700}
small{display:block;margin-top:26px;color:rgba(255,255,255,.45)}
</style></head>
<body>
<div class="card">
<div class="logo">🎲</div>
<h1>Dice Labs</h1>
<p>Thanks For Watching.<br>;)</p>
<div class="tag">COMING SOON...</div>
<small>© Dice Labs</small>
</div>
</body></html>
