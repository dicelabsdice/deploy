<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice Labs</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(0, 255, 170, 0.25), transparent 35%),
        radial-gradient(circle at bottom right, rgba(80, 130, 255, 0.25), transparent 35%),
        #0b1020;
      color: white;
      overflow: hidden;
    }

    .card {
      width: min(90vw, 720px);
      padding: 56px 36px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 28px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      text-align: center;
    }

    .logo {
      font-size: clamp(2.8rem, 9vw, 6rem);
      line-height: 1;
      margin: 0;
      letter-spacing: -0.08em;
    }

    .brand {
      margin: 18px 0 0;
      font-size: clamp(2rem, 7vw, 4.5rem);
      letter-spacing: -0.06em;
      font-weight: 800;
    }

    .tagline {
      margin: 16px auto 0;
      max-width: 520px;
      color: rgba(255,255,255,0.72);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .pill {
      display: inline-block;
      margin-top: 32px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.82);
      font-size: 0.95rem;
      border: 1px solid rgba(255,255,255,0.14);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="logo">🎲</h1>
    <h2 class="brand">Dice Labs</h2>
    <p class="tagline">
      this are the goddamn real dice labs
      <strong><a href="https://dicelabs.com">dicelabs.com</a></strong> can suck my dick...
    </p>
    <div class="pill">🥵</div>
  </main>
</body>
</html>
